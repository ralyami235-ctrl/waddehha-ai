<!DOCTYPE html>
<html>
<head>
  <title>Waddehha AI</title>
</head>

<body style="margin:0; font-family:Arial; background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); color:white;">

  <div style="display:flex; justify-content:center; align-items:center; height:100vh;">

    <div style="background:rgba(255,255,255,0.1); padding:30px; border-radius:15px; width:80%; max-width:600px; text-align:center;">

      <h1>🤖 Waddehha AI</h1>
      <p>تحليل العقود المصرفية بالذكاء الاصطناعي</p>

      <textarea id="contract" placeholder="اكتب العقد هنا..."
        style="width:100%; height:150px; margin-top:15px; padding:10px; border-radius:10px;"></textarea>

      <br><br>

      <button onclick="analyze()"
        style="padding:12px 25px; border:none; border-radius:8px; cursor:pointer; background:#00c6ff; color:white;">
        تحليل العقد
      </button>

      <div id="result" style="margin-top:20px; font-size:16px;"></div>

    </div>

  </div>

<script>
function analyze(){
  let text = document.getElementById("contract").value;

  if(text.length < 20){
    document.getElementById("result").innerHTML = "⚠️ الرجاء إدخال عقد أطول للتحليل";
    return;
  }

  let risk = 0;

  if(text.includes("غرامة")) risk += 1;
  if(text.includes("تأخير")) risk += 1;
  if(text.includes("إلغاء")) risk += 1;

  if(risk == 0){
    document.getElementById("result").innerHTML = "✅ العقد يبدو منخفض المخاطر";
  } else if(risk == 1){
    document.getElementById("result").innerHTML = "⚠️ العقد يحتوي بعض البنود التي تحتاج مراجعة";
  } else {
    document.getElementById("result").innerHTML = "🚨 العقد عالي المخاطر ويحتاج مراجعة قانونية";
  }
}
</script>

</body>
</html>
