<!DOCTYPE html>
<html>
<head>
  <title>Waddehha AI</title>
</head>

<body style="margin:0; font-family:Arial; background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); color:white;">

  <div style="display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px;">

    <div style="background:rgba(255,255,255,0.08); padding:30px; border-radius:18px; width:90%; max-width:750px;">

      <h1 style="text-align:center;">🤖 Waddehha AI</h1>
      <p style="text-align:center; opacity:0.8;">
        نظام ذكي لتحليل العقود المصرفية باستخدام الذكاء الاصطناعي
      </p>

      <textarea id="contract" placeholder="اكتب أو الصق العقد هنا..."
        style="width:100%; height:180px; margin-top:15px; padding:12px; border-radius:10px; border:none; outline:none;"></textarea>

      <button onclick="analyze()"
        style="margin-top:15px; width:100%; padding:14px; border:none; border-radius:10px; cursor:pointer; background:#00c6ff; color:white; font-size:16px;">
        🔍 تحليل العقد
      </button>

      <div id="result" style="margin-top:25px;"></div>

    </div>

  </div>

<script>
function analyze(){

  let text = document.getElementById("contract").value;
  let resultBox = document.getElementById("result");

  if(text.length < 20){
    resultBox.innerHTML = "⚠️ يرجى إدخال عقد أطول للتحليل";
    return;
  }

  resultBox.innerHTML = "⏳ جاري تحليل العقد...";

  setTimeout(() => {

    let riskScore = 0;
    let notes = [];

    if(text.includes("غرامة")){
      riskScore += 30;
      notes.push("وجود غرامة مالية");
    }

    if(text.includes("تأخير")){
      riskScore += 25;
      notes.push("بنود تتعلق بالتأخير");
    }

    if(text.includes("إلغاء")){
      riskScore += 20;
      notes.push("شروط إلغاء العقد");
    }

    if(text.includes("التزام")){
      riskScore += 15;
    }

    let level = "";
    if(riskScore <= 30){
      level = "🟢 منخفض المخاطر";
    } else if(riskScore <= 60){
      level = "🟡 متوسط المخاطر";
    } else {
      level = "🔴 عالي المخاطر";
    }

    resultBox.innerHTML = `
      <div style="background:rgba(255,255,255,0.1); padding:18px; border-radius:12px;">
        <h3>📊 تقرير التحليل</h3>
        <p><b>مستوى المخاطر:</b> ${level}</p>
        <p><b>الملاحظات:</b> ${notes.length ? notes.join(" - ") : "لا توجد مشاكل واضحة"}</p>
        <p><b>التوصية:</b> مراجعة العقد من مختص قانوني قبل التوقيع</p>
        <hr style="opacity:0.3;">
        <p style="font-size:12px; opacity:0.7;">Waddehha AI - Smart Contract Analysis System</p>
      </div>
    `;

  }, 1200);

}
</script>

</body>
</html>
