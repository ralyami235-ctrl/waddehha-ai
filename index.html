<!DOCTYPE html>
<html>
<head>
  <title>Waddehha AI</title>

  <!-- PDF Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body style="margin:0; font-family:Arial; background:#0b1220; color:white;">

<!-- HERO -->
<div id="hero" style="display:flex; justify-content:center; align-items:center; height:100vh; text-align:center; padding:20px;">
  <div>
    <h1 style="font-size:48px;">🤖 Waddehha AI</h1>
    <p style="opacity:0.8;">Enterprise Contract Intelligence System</p>

    <button onclick="startApp()"
      style="margin-top:20px; padding:14px 30px; border:none; border-radius:10px; cursor:pointer; background:#00c6ff; color:white;">
      🚀 Start Analysis
    </button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none; padding:30px;">

  <textarea id="contract" placeholder="Paste contract here..."
    style="width:100%; height:180px; padding:12px; border-radius:10px; border:none;"></textarea>

  <button onclick="analyze()"
    style="margin-top:15px; width:100%; padding:14px; border:none; border-radius:10px; background:#00c6ff; color:white;">
    🔍 Analyze Contract
  </button>

  <div id="result" style="margin-top:25px;"></div>

</div>

<script>

function startApp(){
  document.getElementById("hero").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function analyze(){

  let text = document.getElementById("contract").value;
  let resultBox = document.getElementById("result");

  if(text.length < 20){
    resultBox.innerHTML = "⚠️ Please enter a longer contract";
    return;
  }

  resultBox.innerHTML = "⏳ Analyzing contract...";

  setTimeout(() => {

    let risk = 0;
    let flags = [];

    if(text.includes("غرامة")){ risk += 30; flags.push("Penalty Clause"); }
    if(text.includes("تأخير")){ risk += 25; flags.push("Delay Clause"); }
    if(text.includes("إلغاء")){ risk += 20; flags.push("Termination Clause"); }
    if(text.includes("التزام")){ risk += 10; }

    let level = "";
    let color = "";

    if(risk <= 30){
      level = "🟢 LOW RISK";
      color = "#2ecc71";
    } else if(risk <= 60){
      level = "🟡 MEDIUM RISK";
      color = "#f1c40f";
    } else {
      level = "🔴 HIGH RISK";
      color = "#e74c3c";
    }

    resultBox.innerHTML = `
      <div style="background:rgba(255,255,255,0.08); padding:20px; border-radius:12px; border-left:6px solid ${color};">

        <h3>📊 AI BUSINESS REPORT</h3>

        <p><b>Risk Score:</b> ${risk}%</p>
        <p><b>Status:</b> ${level}</p>
        <p><b>Detected Clauses:</b> ${flags.length ? flags.join(" • ") : "None"}</p>

        <p><b>Recommendation:</b> Legal review recommended before signing.</p>

        <button onclick="downloadPDF()"
          style="margin-top:10px; padding:10px 15px; border:none; border-radius:8px; cursor:pointer; background:white; color:black;">
          📥 Download PDF Report
        </button>

      </div>
    `;

  }, 1000);

}

function downloadPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let reportElement = document.getElementById("result");

  // نحول النص بشكل منظم
  let text = reportElement.innerText
    .replace(/\n\s*\n/g, "\n")
    .trim();

  doc.setFontSize(16);
  doc.text("Waddehha AI - Contract Report", 10, 20);

  doc.setFontSize(12);

  let lines = doc.splitTextToSize(text, 180);
  doc.text(lines, 10, 40);

  doc.setFontSize(10);
  doc.text("Generated by Waddehha AI System", 10, 280);

  doc.save("Waddehha_AI_Report.pdf");
}

</script>

</body>
</html>
