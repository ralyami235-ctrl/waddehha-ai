<!DOCTYPE html>
<html>
<head>
  <title>Waddehha AI</title>
</head>

<body style="margin:0; font-family:Arial; background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); color:white;">

<!-- Landing Page -->
<div id="home" style="display:flex; justify-content:center; align-items:center; height:100vh; text-align:center; padding:20px;">
  
  <div>
    <h1 style="font-size:42px;">🤖 Waddehha AI</h1>
    <p style="opacity:0.8; font-size:18px;">نظام تحليل العقود الذكي للشركات والبنوك</p>
    <button onclick="startApp()" 
      style="margin-top:20px; padding:14px 30px; border:none; border-radius:10px; cursor:pointer; background:#00c6ff; color:white; font-size:16px;">
      🚀 بدء التحليل
    </button>
  </div>

</div>

<!-- App Page -->
<div id="app" style="display:none; justify-content:center; align-items:center; min-height:100vh; padding:20px;">

  <div style="background:rgba(255,255,255,0.08); padding:30px; border-radius:18px; width:90%; max-width:750px;">

    <h2 style="text-align:center;">📄 لوحة تحليل العقود</h2>

    <textarea id="contract" placeholder="اكتب العقد هنا..."
      style="width:100%; height:180px; margin-top:15px; padding:12px; border-radius:10px; border:none; outline:none;"></textarea>

    <button onclick="analyze()"
      style="margin-top:15px; width:100%; padding:14px; border:none; border-radius:10px; cursor:pointer; background:#00c6ff; color:white;">
      🔍 تحليل العقد
    </button>

    <div id="result" style="margin-top:25px;"></div>

  </div>

</div>

<script>

function startApp(){
  document.getElementById("home").style.display = "none";
  document.getElementById("app").style.display = "flex";
}

function analyze(){

  let text = document.getElementById("contract").value;
  let resultBox = document.getElementById("result");

  if(text.length < 20){
    resultBox.innerHTML = "⚠️ الرجاء إدخال عقد أطول للتحليل";
    return;
  }

  resultBox.innerHTML = "⏳ يتم الآن تحليل العقد...";

  setTimeout(() => {

    let risk = 0;
    let notes = [];

    if(text.includes("غرامة")){ risk += 30; notes.push("غرامة مالية"); }
    if(text.includes("تأخير")){ risk += 25; notes.push("تأخير في التنفيذ"); }
    if(text.includes("إلغاء")){ risk += 20; notes.push("شروط إلغاء"); }
    if(text.includes("التزام")){ risk += 10; }

    let level = "";
    let color = "";

    if(risk <= 30){
      level = "🟢 منخفض المخاطر";
      color = "green";
    } else if(risk <= 60){
      level = "🟡 متوسط المخاطر";
      color = "orange";
    } else {
      level = "🔴 عالي المخاطر";
      color = "red";
    }

    resultBox.innerHTML = `
      <div style="background:rgba(255,255,255,0.1); padding:20px; border-radius:12px; border-left:5px solid ${color};">
        <h3>📊 تقرير التحليل</h3>
        <p><b>مستوى المخاطر:</b> ${level}</p>
        <p><b>النقاط المكتشفة:</b> ${notes.length ? notes.join(" - ") : "لا يوجد مشاكل واضحة"}</p>
        <p><b>التوصية:</b> مراجعة قانونية قبل التوقيع</p>
        <hr style="opacity:0.3;">
        <p style="font-size:12px; opacity:0.7;">Powered by Waddehha AI • Enterprise Demo</p>
      </div>
    `;

  }, 1200);

}

</script>

</body>
</html>
