<!DOCTYPE html>
<html>
<head>
  <title>Waddehha AI</title>
</head>

<body style="margin:0; font-family:Arial; background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); color:white;">

<!-- HERO -->
<div id="hero" style="display:flex; justify-content:center; align-items:center; height:100vh; text-align:center; padding:20px;">
  <div>
    <h1 style="font-size:48px;">🤖 Waddehha AI</h1>
    <p style="opacity:0.85; font-size:18px;">
      منصة تحليل العقود المصرفية بالذكاء الاصطناعي
    </p>
    <p style="opacity:0.6; font-size:14px;">
      نظام يساعد على كشف المخاطر القانونية خلال ثوانٍ
    </p>

    <button onclick="startApp()"
      style="margin-top:25px; padding:14px 32px; border:none; border-radius:10px; cursor:pointer; background:#00c6ff; color:white; font-size:16px;">
      🚀 دخول النظام
    </button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none; padding:30px;">

  <h2 style="text-align:center;">📊 لوحة تحليل العقود</h2>

  <!-- STATS -->
  <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:20px;">
    <div style="background:rgba(255,255,255,0.1); padding:10px 20px; border-radius:10px;">⚡ Fast AI</div>
    <div style="background:rgba(255,255,255,0.1); padding:10px 20px; border-radius:10px;">🛡 Risk Scanner</div>
    <div style="background:rgba(255,255,255,0.1); padding:10px 20px; border-radius:10px;">📄 Contract Review</div>
  </div>

  <!-- INPUT -->
  <div style="max-width:800px; margin:20px auto;">

    <textarea id="contract" placeholder="اكتب العقد هنا..."
      style="width:100%; height:180px; padding:12px; border-radius:10px; border:none; outline:none;"></textarea>

    <button onclick="analyze()"
      style="margin-top:15px; width:100%; padding:14px; border:none; border-radius:10px; cursor:pointer; background:#00c6ff; color:white;">
      🔍 تحليل العقد الآن
    </button>

    <div id="result" style="margin-top:25px;"></div>

  </div>

</div>

<script>

function startApp(){
  document.getElementById("hero").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function analyze(){

  let text = document.getElementById("contract").value;
  let resultBox = document.getElementById("result");

  if(text.length < 20){
    resultBox.innerHTML = "⚠️ الرجاء إدخال عقد أطول للتحليل";
    return;
  }

  resultBox.innerHTML = "⏳ يتم تحليل العقد باستخدام Waddehha AI...";

  setTimeout(() => {

    let risk = 0;
    let flags = [];

    if(text.includes("غرامة")){ risk += 30; flags.push("Penalties"); }
    if(text.includes("تأخير")){ risk += 25; flags.push("Delays"); }
    if(text.includes("إلغاء")){ risk += 20; flags.push("Termination"); }
    if(text.includes("التزام")){ risk += 10; }

    let level = "";
    let color = "";
    let score = risk + "%";

    if(risk <= 30){
      level = "🟢 Low Risk";
      color = "green";
    } else if(risk <= 60){
      level = "🟡 Medium Risk";
      color = "orange";
    } else {
      level = "🔴 High Risk";
      color = "red";
    }

    resultBox.innerHTML = `
      <div style="background:rgba(255,255,255,0.1); padding:20px; border-radius:12px; border-left:6px solid ${color};">

        <h3>📑 AI Legal Report</h3>

        <p><b>Risk Score:</b> ${score}</p>
        <p><b>Risk Level:</b> ${level}</p>

        <p><b>Detected Issues:</b> ${flags.length ? flags.join(" • ") : "No critical issues found"}</p>

        <p><b>Recommendation:</b> Review contract with legal advisor before signing.</p>

        <hr style="opacity:0.3;">

        <p style="font-size:12px; opacity:0.7;">
          Waddehha AI • Championship Edition • Smart Contract Intelligence
        </p>

      </div>
    `;

  }, 1200);

}

</script>

</body>
</html>
